version: '3.8'

services:
  ft_onion:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: ${DOCKER_CONTAINER:-ft_onion}
    
    networks:
      - tor_network
    
    ports:
      - "4242:4242"  # Puerto SSH (expuesto)
      # Puerto 80 (HTTP) NO está expuesto - solo interno vía Tor
    
    volumes:
      # Persistencia de claves de servicio oculto Tor
      - tor_hidden_service:/var/lib/tor/hidden_service
      
      # Persistencia de datos de Tor
      - tor_data:/var/lib/tor
      
      # Logs de aplicación
      - ft_onion_logs:/app/logs
      
      # Montaje de configuración (opcional - descomenta para sobrescribir)
      # - ./src/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./src/torrc:/etc/tor/torrc:ro
      # - ./src/sshd_config:/etc/ssh/sshd_config:ro
    
    # Variables de entorno para Python
    environment:
      - PYTHONUNBUFFERED=1        # Desactiva buffering de salida Python (logs en tiempo real)
      - PYTHONDONTWRITEBYTECODE=1 # No genera archivos .pyc (contenedor limpio)
      - TZ=UTC                     # Zona horaria para logs consistentes
    
    # Política de reinicio: mantiene contenedor activo, reinicia al fallar
    restart: unless-stopped
    
    # Verificación de salud automática del servicio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health", "||", "exit", "1"]  # Verifica endpoint /health
      interval: 30s        # Comprueba cada 30 segundos
      timeout: 10s         # Máximo espera por respuesta
      retries: 3           # Reinicia tras 3 fallos consecutivos
      start_period: 40s    # Espera antes de primera verificación
    
    # Opciones de seguridad: impide que el contenedor adquiera nuevos privilegios
    security_opt:
      - no-new-privileges:true
    
    # Límites de recursos: previene que consuma CPU/RAM ilimitadamente
    deploy:
      resources:
        limits:
          cpus: '1.0'       # Máximo: 1 CPU
          memory: 512M      # Máximo: 512 MB RAM
        reservations:
          cpus: '0.5'       # Garantizado: 0.5 CPU
          memory: 256M      # Garantizado: 256 MB RAM
    
    # Configuración de logging JSON: limita tamaño y rotación de logs
    logging:
      driver: "json-file"  # Formato JSON para fácil parsing
      options:
        max-size: "10m"        # Máximo 10 MB por archivo
        max-file: "3"          # Mantiene máximo 3 archivos rotados
        labels: "service=ft_onion"  # Etiqueta para identificar logs

# Red Docker personalizada para comunicación entre contenedores
networks:
  tor_network:
    driver: bridge              # Aislamiento de red tipo puente
    ipam:
      config:
        - subnet: 172.25.0.0/16 # Subred dedicada para ft_onion

# Volúmenes Docker para persistencia de datos entre reinicios
volumes:
  tor_hidden_service:  # Almacena claves privadas y dirección .onion
    driver: local
  tor_data:            # Almacena estado y caché de Tor
    driver: local
  ft_onion_logs:       # Almacena logs de aplicación y servicios
    driver: local
